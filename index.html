<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netheron | Official Channel</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.8)), 
                        url('https://minecraft.net');
            background-size: cover;
            background-position: center;
            font-family: 'Courier New', Courier, monospace;
            color: white;
            text-align: center;
        }

        h1 {
            font-size: 5rem;
            margin: 0;
            text-shadow: 6px 6px 0px #373737;
            letter-spacing: 5px;
        }

        p {
            font-size: 1.5rem;
            background: rgba(0, 0, 0, 0.7);
            padding: 10px 20px;
            border: 2px solid #555;
            margin-top: 15px;
        }

        .sub-button {
            display: inline-block;
            margin-top: 30px;
            background-color: #5d5d5d;
            color: white !important;
            text-decoration: none !important;
            padding: 20px 50px;
            font-size: 2rem;
            font-weight: bold;
            border: 4px solid #000;
            box-shadow: inset -4px -4px 0px #373737, inset 4px 4px 0px #ababab;
            cursor: pointer;
        }

        .sub-button:hover {
            background-color: #ff0000;
            box-shadow: inset -4px -4px 0px #8b0000, inset 4px 4px 0px #ff4545;
        }

        #music-status {
            position: fixed;
            bottom: 20px;
            background: rgba(0,0,0,0.5);
            padding: 5px 15px;
            font-size: 0.8rem;
        }
    </style>
</head>
<body onclick="playMusic()">

    <h1>NETHERON</h1>
    <p>OFFICIAL MINECRAFT CHANNEL</p>
    
    <!-- הקישור המתוקן - ללא תוספות שחוסמות -->
    <a href="https://www.youtube.com/@Netheron-i2m" target="_blank" class="sub-button">
        SUBSCRIBE
    </a>

    <div id="music-status">Click anywhere to play Minecraft music 🔊</div>

    <!-- מוזיקה ממקור חלופי - Sweden של C418 -->
    <audio id="mcAudio" loop prefetch>
        <source src="https://vgmdownloads.com" type="audio/mpeg">
    </audio>

    <script>
        function playMusic() {
            var audio = document.getElementById("mcAudio");
            audio.volume = 0.5;
            audio.play().catch(function(error) {
                console.log("Music play failed, try clicking again!");
            });
            document.getElementById("music-status").innerHTML = "Now Playing: C418 - Sweden 🎶";
        }
    </script>

</body>
</html>
